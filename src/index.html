<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<meta name="description" content="WebGL game inspired by Angry Birds." />
	<title>Angry Birds | WebGL game</title>
	<link rel="icon" type="image/x-icon" href="/images/favicon.ico" />
	<link rel="stylesheet" href="./style.css" />
	<script type="module" src="./main.js" defer></script>
</head>

<body>

	<!-- Svg -->
	<svg hidden>
		<symbol id="star-icon" viewBox="0 0 24 24">
			<path d="M12 2V22M19.0711 4.92893L4.92893 19.0711M22 12H2M19.0711 19.0711L4.92893 4.92893"
				stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" />
		</symbol>
		<symbol id="lock-icon" viewBox="0 0 24 24">
			<path
				d="M17 10V8C17 5.23858 14.7614 3 12 3C9.23858 3 7 5.23858 7 8V10M12 14.5V16.5M8.8 21H15.2C16.8802 21 17.7202 21 18.362 20.673C18.9265 20.3854 19.3854 19.9265 19.673 19.362C20 18.7202 20 17.8802 20 16.2V14.8C20 13.1198 20 12.2798 19.673 11.638C19.3854 11.0735 18.9265 10.6146 18.362 10.327C17.7202 10 16.8802 10 15.2 10H8.8C7.11984 10 6.27976 10 5.63803 10.327C5.07354 10.6146 4.6146 11.0735 4.32698 11.638C4 12.2798 4 13.1198 4 14.8V16.2C4 17.8802 4 18.7202 4.32698 19.362C4.6146 19.9265 5.07354 20.3854 5.63803 20.673C6.27976 21 7.11984 21 8.8 21Z"
				stroke="#ffffff50" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" />
		</symbol>
		<symbol id="cross-icon" viewBox="0 0 24 24">
			<path d="M18 6L6 18M6 6L18 18" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
				fill="none" />
		</symbol>
	</svg>

	<!-- Loader -->
	<div id="loader">
		<div id="loader-inner">
			<div id="loader-click">
				<p>Click To Start</p>
				<svg id="loader-click-icon" width="16" height="16">
					<use href="#star-icon" />
				</svg>
			</div>
			<div id="loader-progress"></div>
			<div id="loader-text">
				<p id="loader-loading">Loading</p>
				<p id="loader-percent">0%</p>
			</div>
		</div>
	</div>

	<!-- Game -->
	<main>
		<div id="ui">

			<!-- Stars -->
			<div id="stars" class="pill home">
				<p><span id="stars-total">0</span> <span class="text-default">of</span> 9</p>
				<svg width="24" height="24">
					<use href="#star-icon" />
				</svg>
			</div>

			<!-- Select -->
			<nav id="select" class="pill home">
				<button class="select-btn" data-level="1">
					<span class="select-btn-level">1</span>
					<div class="select-btn-stars">
						<svg class="select-btn-star" width="16" height="16">
							<use href="#star-icon" />
						</svg>
						<svg class="select-btn-star" width="16" height="16">
							<use href="#star-icon" />
						</svg>
						<svg class="select-btn-star" width="16" height="16">
							<use href="#star-icon" />
						</svg>
					</div>
				</button>
				<div class="divider"></div>
				<button class="select-btn locked" data-level="2">
					<span class="select-btn-level">2</span>
					<svg class="select-btn-lock" width="24" height="24">
						<use href="#lock-icon" />
					</svg>
					<div class="select-btn-stars">
						<svg class="select-btn-star" width="16" height="16">
							<use href="#star-icon" />
						</svg>
						<svg class="select-btn-star" width="16" height="16">
							<use href="#star-icon" />
						</svg>
						<svg class="select-btn-star" width="16" height="16">
							<use href="#star-icon" />
						</svg>
					</div>
				</button>
				<div class="divider"></div>
				<button class="select-btn locked" data-level="3">
					<span class="select-btn-level">3</span>
					<svg class="select-btn-lock" width="24" height="24">
						<use href="#lock-icon" />
					</svg>
					<div class="select-btn-stars">
						<svg class="select-btn-star" width="16" height="16">
							<use href="#star-icon" />
						</svg>
						<svg class="select-btn-star" width="16" height="16">
							<use href="#star-icon" />
						</svg>
						<svg class="select-btn-star" width="16" height="16">
							<use href="#star-icon" />
						</svg>
					</div>
				</button>
			</nav>

			<!-- Controls -->
			<div id="controls" class="pill home">
				<button id="sound-btn">
					<span></span>
					<span></span>
					<span></span>
					<span></span>
				</button>
				<div class="divider"></div>
				<button id="fullscreen-btn">
					<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"
						stroke-linecap="round" stroke-linejoin="round">
						<path class="fullscreen-icon active"
							d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3" />
						<path class="fullscreen-icon"
							d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3" />
					</svg>
				</button>
			</div>

			<!-- Zoom -->
			<div id="zoom">
				<span class="home"></span>
				<span class="home"></span>
				<span class="home"></span>
				<span class="home"></span>
				<span class="home"></span>
				<span class="home"></span>
				<span class="home"></span>
				<span class="home"></span>
				<span class="home"></span>
				<span class="home"></span>
			</div>

			<!-- Power -->
			<div id="power">
				<span class="level"></span>
				<span class="level"></span>
				<span class="level"></span>
				<span class="level"></span>
				<span class="level"></span>
				<span class="level"></span>
				<span class="level"></span>
				<span class="level"></span>
				<span class="level"></span>
				<span class="level"></span>
			</div>

			<!-- Level -->
			<div id="level" class="pill level">
				<span id="level-number">1</span>
				<div class="divider"></div>
				<div class="characters">
					<img src="/images/bird.webp" alt="bird" width="20" height="20">
					<span id="birds-left" class="text-default">3</span>
				</div>
				<div class="divider"></div>
				<div id="destruction">
					<div id="destruction-stars">
						<svg class="destruction-star" width="16" height="16">
							<use href="#star-icon" />
						</svg>
						<svg class="destruction-star" width="16" height="16">
							<use href="#star-icon" />
						</svg>
						<svg class="destruction-star" width="16" height="16">
							<use href="#star-icon" />
						</svg>
					</div>
					<div id="destruction-progress"></div>
				</div>
				<div class="divider"></div>
				<div class="characters">
					<img src="/images/pig.webp" alt="pig" width="20" height="20">
					<span id="pigs-left" class="text-default">2</span>
				</div>
				<div class="divider"></div>
				<button id="close-btn">
					<svg width="24" height="24">
						<use href="#cross-icon" />
					</svg>
				</button>
			</div>

			<!-- End -->
			<p id="end-win">Well Done!</p>
			<p id="end-lose">So Close!</p>
		</div>

		<!-- WebGL -->
		<canvas id="webgl"></canvas>
	</main>
</body>

</html>
