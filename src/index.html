<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Angry Birds | WebGL game</title>
	<meta name="description" content="WebGL game inspired by Angry Birds." />
	<meta name="robots" content="index, follow" />
	<link rel="icon" type="image/x-icon" href="/images/favicon.ico" />
	<link rel="stylesheet" href="./style.css" />
	<script type="module" src="./main.js" defer></script>
</head>

<body>

	<!-- Svg sprite-->
	<svg hidden>
		<symbol id="icon-star" viewBox="0 0 24 24">
			<path d="M12 2V22M19.0711 4.92893L4.92893 19.0711M22 12H2M19.0711 19.0711L4.92893 4.92893"
				stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" />
		</symbol>
		<symbol id="icon-lock" viewBox="0 0 24 24">
			<path
				d="M17 10V8C17 5.23858 14.7614 3 12 3C9.23858 3 7 5.23858 7 8V10M12 14.5V16.5M8.8 21H15.2C16.8802 21 17.7202 21 18.362 20.673C18.9265 20.3854 19.3854 19.9265 19.673 19.362C20 18.7202 20 17.8802 20 16.2V14.8C20 13.1198 20 12.2798 19.673 11.638C19.3854 11.0735 18.9265 10.6146 18.362 10.327C17.7202 10 16.8802 10 15.2 10H8.8C7.11984 10 6.27976 10 5.63803 10.327C5.07354 10.6146 4.6146 11.0735 4.32698 11.638C4 12.2798 4 13.1198 4 14.8V16.2C4 17.8802 4 18.7202 4.32698 19.362C4.6146 19.9265 5.07354 20.3854 5.63803 20.673C6.27976 21 7.11984 21 8.8 21Z"
				stroke="#ffffff50" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" />
		</symbol>
		<symbol id="icon-close" viewBox="0 0 24 24">
			<path d="M18 6L6 18M6 6L18 18" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
				fill="none" />
		</symbol>
	</svg>

	<!-- Loader -->
	<div id="loader">
		<div id="loader-inner">
			<div id="loader-click">
				<p>Click To Start</p>
				<svg id="loader-click-star" width="16" height="16">
					<use href="#icon-star" />
				</svg>
			</div>
			<div id="loader-progress"></div>
			<div id="loader-text">
				<p id="loader-loading">Loading</p>
				<p id="loader-percent">0%</p>
			</div>
		</div>
	</div>

	<!-- Game -->
	<main>
		<div id="ui">

			<!-- Total stars -->
			<div id="stars" class="pill home">
				<p>0 <span class="font-size-default">of</span> 9</p>
				<svg width="24" height="24">
					<use href="#icon-star" />
				</svg>
			</div>

			<!-- Level select -->
			<nav id="nav" class="pill home">
				<button class="btn-level" data-level="1">
					<span class="btn-level-number">1</span>
					<div class="btn-level-stars">
						<svg class="btn-level-star" width="16" height="16">
							<use href="#icon-star" />
						</svg>
						<svg class="btn-level-star" width="16" height="16">
							<use href="#icon-star" />
						</svg>
						<svg class="btn-level-star" width="16" height="16">
							<use href="#icon-star" />
						</svg>
					</div>
				</button>
				<div class="divider"></div>
				<button class="btn-level locked" data-level="2">
					<span class="btn-level-number">2</span>
					<svg class="btn-level-lock" width="24" height="24">
						<use href="#icon-lock" />
					</svg>
					<div class="btn-level-stars">
						<svg class="btn-level-star" width="16" height="16">
							<use href="#icon-star" />
						</svg>
						<svg class="btn-level-star" width="16" height="16">
							<use href="#icon-star" />
						</svg>
						<svg class="btn-level-star" width="16" height="16">
							<use href="#icon-star" />
						</svg>
					</div>
				</button>
				<div class="divider"></div>
				<button class="btn-level locked" data-level="3">
					<span class="btn-level-number">3</span>
					<svg class="btn-level-lock" width="24" height="24">
						<use href="#icon-lock" />
					</svg>
					<div class="btn-level-stars">
						<svg class="btn-level-star" width="16" height="16">
							<use href="#icon-star" />
						</svg>
						<svg class="btn-level-star" width="16" height="16">
							<use href="#icon-star" />
						</svg>
						<svg class="btn-level-star" width="16" height="16">
							<use href="#icon-star" />
						</svg>
					</div>
				</button>
			</nav>

			<!-- Controls -->
			<div id="controls" class="pill home">
				<button id="btn-sound">
					<span></span>
					<span></span>
					<span></span>
					<span></span>
				</button>
				<div class="divider"></div>
				<button id="btn-fullscreen">
					<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"
						stroke-linecap="round" stroke-linejoin="round">
						<path class="icon-fs active"
							d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3" />
						<path class="icon-fs"
							d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3" />
					</svg>
				</button>
			</div>

			<!-- Zoom indicator -->
			<div id="zoom">
				<span class="home"></span>
				<span class="home"></span>
				<span class="home"></span>
				<span class="home"></span>
				<span class="home"></span>
				<span class="home"></span>
				<span class="home"></span>
				<span class="home"></span>
				<span class="home"></span>
				<span class="home"></span>
			</div>

			<!-- Power indicator -->
			<div id="power">
				<span class="level"></span>
				<span class="level"></span>
				<span class="level"></span>
				<span class="level"></span>
				<span class="level"></span>
				<span class="level"></span>
				<span class="level"></span>
				<span class="level"></span>
				<span class="level"></span>
				<span class="level"></span>
			</div>

			<!-- Level -->
			<div id="level" class="pill level">
				<span>1</span>
				<div class="divider"></div>
				<div id="birds">
					<img src="/images/bird.webp" alt="Birds remaining" width="20" height="20">
					<span class="font-size-default">3</span>
				</div>
				<div class="divider"></div>
				<div id="destruction">
					<div id="destruction-stars">
						<svg class="destruction-star" width="16" height="16">
							<use href="#icon-star" />
						</svg>
						<svg class="destruction-star" width="16" height="16">
							<use href="#icon-star" />
						</svg>
						<svg class="destruction-star" width="16" height="16">
							<use href="#icon-star" />
						</svg>
					</div>
					<div id="destruction-progress"></div>
				</div>
				<div class="divider"></div>
				<div id="pigs">
					<img src="/images/pig.webp" alt="Pigs remaining" width="20" height="20">
					<span class="font-size-default">2</span>
				</div>
				<div class="divider"></div>
				<button id="btn-close">
					<svg width="24" height="24">
						<use href="#icon-close" />
					</svg>
				</button>
			</div>
		</div>

		<!-- WebGL canvas -->
		<canvas id="webgl"></canvas>
	</main>
</body>

</html>
