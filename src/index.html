<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Angry Birds | WebGL game</title>
	<meta name="description" content="WebGL game inspired by Angry Birds." />
	<meta name="robots" content="index, follow" />
	<link rel="icon" type="image/x-icon" href="/images/favicon.ico" />
	<meta name="theme-color" content="#ea002a" />
	<link rel="stylesheet" href="./style.css" />
	<script type="module" src="./main.js" defer></script>
</head>

<body>
	<!-- SVG sprite -->
	<svg hidden>
		<symbol id="icon-star" viewBox="0 0 24 24">
			<path d="M12 2V22M19.0711 4.92893L4.92893 19.0711M22 12H2M19.0711 19.0711L4.92893 4.92893"
				stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
		</symbol>
		<symbol id="icon-lock" viewBox="0 0 24 24">
			<path
				d="M17 10V8C17 5.23858 14.7614 3 12 3C9.23858 3 7 5.23858 7 8V10M12 14.5V16.5M8.8 21H15.2C16.8802 21 17.7202 21 18.362 20.673C18.9265 20.3854 19.3854 19.9265 19.673 19.362C20 18.7202 20 17.8802 20 16.2V14.8C20 13.1198 20 12.2798 19.673 11.638C19.3854 11.0735 18.9265 10.6146 18.362 10.327C17.7202 10 16.8802 10 15.2 10H8.8C7.11984 10 6.27976 10 5.63803 10.327C5.07354 10.6146 4.6146 11.0735 4.32698 11.638C4 12.2798 4 13.1198 4 14.8V16.2C4 17.8802 4 18.7202 4.32698 19.362C4.6146 19.9265 5.07354 20.3854 5.63803 20.673C6.27976 21 7.11984 21 8.8 21Z"
				stroke="#ffffff75" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" />
		</symbol>
		<symbol id="icon-quit" viewBox="0 0 24 24">
			<path
				d="M16 17L21 12M21 12L16 7M21 12H9M9 3H7.8C6.11984 3 5.27976 3 4.63803 3.32698C4.07354 3.6146 3.6146 4.07354 3.32698 4.63803C3 5.27976 3 6.11984 3 7.8V16.2C3 17.8802 3 18.7202 3.32698 19.362C3.6146 19.9265 4.07354 20.3854 4.63803 20.673C5.27976 21 6.11984 21 7.8 21H9"
				stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" />
		</symbol>
		<symbol id="icon-flame" viewBox="0 0 24 24">
			<path d="M12 3q1 4 4 6.5t3 5.5a1 1 0 0 1-14 0 5 5 0 0 1 1-3 1 1 0 0 0 5 0c0-2-1.5-3-1.5-5q0-2 2.5-4"
				stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" />
		</symbol>
	</svg>

	<!-- Loader -->
	<div id="loader" role="status">
		<div id="loader-inner">
			<div id="loader-label">
				<p id="loader-label-loading">
					<span>L</span><span>o</span><span>a</span><span>d</span><span>i</span><span>n</span><span>g</span>
				</p>
				<p id="loader-label-loaded">
					<span>L</span><span>o</span><span>a</span><span>d</span><span>e</span><span>d</span>
				</p>
			</div>
			<div id="loader-progress" role="progressbar"></div>
		</div>
		<p id="loader-cta">Press <kbd id="loader-enter">Enter</kbd> to start.</p>
	</div>

	<!-- Game -->
	<main>
		<div id="hud">
			<!-- Stars -->
			<div id="hud-stars">
				<p class="ui-start"><span id="total-stars">0</span>/9</p>
				<svg class="ui-start" width="26" height="26">
					<use href="#icon-star" />
				</svg>
			</div>

			<!-- Levels -->
			<nav id="hud-levels">
				<button class="btn-level ui-start" data-level="1">
					<span class="btn-level-label">1</span>
					<svg class="btn-level-icon-star" width="16" height="16">
						<use href="#icon-star" />
					</svg>
					<svg class="btn-level-icon-star" width="16" height="16">
						<use href="#icon-star" />
					</svg>
					<svg class="btn-level-icon-star" width="16" height="16">
						<use href="#icon-star" />
					</svg>
				</button>

				<button class="btn-level locked ui-start" data-level="2">
					<span class="btn-level-label">2</span>
					<svg class="btn-level-icon-lock" width="24" height="24">
						<use href="#icon-lock" />
					</svg>
					<svg class="btn-level-icon-star" width="16" height="16">
						<use href="#icon-star" />
					</svg>
					<svg class="btn-level-icon-star" width="16" height="16">
						<use href="#icon-star" />
					</svg>
					<svg class="btn-level-icon-star" width="16" height="16">
						<use href="#icon-star" />
					</svg>
				</button>

				<button class="btn-level locked ui-start" data-level="3">
					<span class="btn-level-label">3</span>
					<svg class="btn-level-icon-lock" width="24" height="24">
						<use href="#icon-lock" />
					</svg>
					<svg class="btn-level-icon-star" width="16" height="16">
						<use href="#icon-star" />
					</svg>
					<svg class="btn-level-icon-star" width="16" height="16">
						<use href="#icon-star" />
					</svg>
					<svg class="btn-level-icon-star" width="16" height="16">
						<use href="#icon-star" />
					</svg>
				</button>
			</nav>

			<!-- Controls -->
			<div id="hud-controls">
				<button id="btn-sound" class="ui-start">
					<span></span>
					<span></span>
					<span></span>
					<span></span>
				</button>
				<button id="btn-fs" class="ui-start">
					<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.75"
						stroke-linecap="round" stroke-linejoin="round">
						<path class="icon-fs active"
							d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3" />
						<path class="icon-fs"
							d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3" />
					</svg>
				</button>
			</div>

			<!-- Zoom -->
			<div id="hud-zoom">
				<span class="ui-start"></span>
				<span class="ui-start"></span>
				<span class="ui-start"></span>
				<span class="ui-start"></span>
				<span class="ui-start"></span>
				<span class="ui-start"></span>
				<span class="ui-start"></span>
				<span class="ui-start"></span>
				<span class="ui-start"></span>
			</div>

			<!-- Force -->
			<div id="hud-force">
				<span></span>
				<span></span>
				<span></span>
				<span></span>
				<span></span>
				<span></span>
				<span></span>
				<span></span>
				<span></span>
			</div>

			<!-- Level -->
			<div id="hud-level">
				<div id="level-wrap">
					<span id="level-number">1</span>
					<div class="level-divider"></div>
					<div id="characters">
						<div class="characters-wrap">
							<p><span>3</span>/3</p>
							<img src="/images/bird.webp" alt="" width="20" height="20">
						</div>
						<div class="level-divider"></div>
						<div class="characters-wrap">
							<p><span>3</span>/3</p>
							<img src="/images/pig.webp" alt="" width="20" height="20">
						</div>
						<div class="level-divider"></div>
						<div class="characters-wrap">
							<p><span>3</span>/3</p>
							<svg width="20" height="20">
								<use href="#icon-star" />
							</svg>
						</div>
					</div>
					<div class="level-divider"></div>
					<button id="btn-quit">
						<svg width="24" height="24">
							<use href="#icon-quit" />
						</svg>
					</button>
				</div>
				<div id="destruction">
					<svg width="20" height="20">
						<use href="#icon-flame" />
					</svg>
					<div id="destruction-wrap">
						<span></span>
						<span></span>
						<span></span>
					</div>
				</div>
			</div>
		</div>
		<canvas id="webgl"></canvas>
	</main>
</body>

</html>
